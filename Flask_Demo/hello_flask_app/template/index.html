<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 10px 0;
            text-align: center;
        }
        p {
            margin: 20px;
            font-size: 18px;
        }
        a {
            color: #333;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
            background-color: #ccc;
        }
    </style>

</head>
<body>
    <header>
        <h1>{{ title }}</h1>
    </header>
    <main>
        <p>Welcome to the {{ title }}!</p>
        <p>This is a simple Flask app with a basic layout.</p>
        <a href="{{ url_for('about') }}">Learn more about us</a>
    </main>
</body>
</html>
